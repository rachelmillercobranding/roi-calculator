<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F7F2EF;
  font-family: 'Montserrat', sans-serif;
  padding: 32px 24px;
  color: #22252A;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  max-width: 820px;
  margin: 0 auto;
}
.card {
  background: white;
  border: 0.5px solid #e0dbd5;
  border-radius: 14px;
  padding: 1.25rem;
}
.card.result {
  background: #7E8C7A;
}
.label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 0.5rem;
}
.label.light {
  color: rgba(255,255,255,0.7);
}
.value {
  font-size: 24px;
  font-weight: 500;
  color: #7E8C7A;
  margin-bottom: 0.75rem;
}
.result-value {
  font-size: 24px;
  font-weight: 500;
  color: white;
  margin-bottom: 0.75rem;
  min-height: 32px;
}
input[type=range] {
  width: 100%;
  appearance: none;
  height: 4px;
  border-radius: 4px;
  background: #e6e2df;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  appearance: none;
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: #7E8C7A;
  cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: #7E8C7A;
  border: none;
  cursor: pointer;
}
@media (max-width: 580px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="grid">
  <div class="card">
    <div class="label">Clients per week</div>
    <div class="value" id="clientsVal">21</div>
    <input type="range" min="10" max="35" value="21" step="1" id="clientsSlider">
  </div>
  <div class="card">
    <div class="label">Session rate</div>
    <div class="value" id="rateVal">$120</div>
    <input type="range" min="75" max="250" value="120" step="1" id="rateSlider">
  </div>
  <div class="card result">
    <div class="label light">Est. monthly</div>
    <div class="result-value" id="monthly">—</div>
  </div>
  <div class="card result">
    <div class="label light">Est. annual</div>
    <div class="result-value" id="annual">—</div>
  </div>
</div>
<script>
const clients = document.getElementById('clientsSlider');
const rate = document.getElementById('rateSlider');
const clientsVal = document.getElementById('clientsVal');
const rateVal = document.getElementById('rateVal');
const monthly = document.getElementById('monthly');
const annual = document.getElementById('annual');
function calc() {
  const c = Number(clients.value);
  const r = Number(rate.value);
  clientsVal.textContent = c;
  rateVal.textContent = '$' + r;
  const yr = Math.round(c * r * 42);
  const mo = Math.round(yr / 12);
  monthly.textContent = '$' + mo.toLocaleString();
  annual.textContent = '$' + yr.toLocaleString();
}
['input','change','mouseup','touchend'].forEach(e => {
  clients.addEventListener(e, calc);
  rate.addEventListener(e, calc);
});
let lc = clients.value, lr = rate.value;
setInterval(() => {
  if (clients.value !== lc || rate.value !== lr) {
    lc = clients.value; lr = rate.value; calc();
  }
}, 150);
calc();
</script>
</body>
</html>
